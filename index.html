<!DOCTYPE html>
<html lang="es">
<head>
    <meta property="og:title" content="One Play More Games">
    <meta property="og:description" content="Compra videojuegos y revisa nuestro inventario actualizado.">
    <meta property="og:image" content="https://oneplaymoregames.store/Logo Negro.jpg">
    <meta property="og:url" content="https://oneplaymoregames.store">
    <meta property="og:type" content="website">
    <meta name="description" content="Inventario de videojuegos actualizado. Compra juegos al mejor precio en One Play More Games.">
    <meta name="google-site-verification" content="fzyiFZIiCj-5XuEZbHm10velOsEG6tMsUCCJxWgPanE" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SKBLTSXX04"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-SKBLTSXX04');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Play More - Tienda TCG & Coleccionables</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/imagenes/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/imagenes/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/imagenes/favicon-16x16.png">
    <link rel="manifest" href="/imagenes/site.webmanifest">
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Estilos propios -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo-section">
                <img src="OPM.png" alt="One Play More" class="logo-image">
                <div class="logo-text">
                    <h1>One Play More</h1>
                    <p>Tienda de TCG & Coleccionables</p>
                </div>
            </div>
            <div class="header-actions">
                <!-- Botón para abrir/cerrar filtros -->
                <button class="filter-toggle" id="filterToggle" title="Filtros">
                    <i class="fas fa-sliders-h"></i>
                </button>
                <button class="theme-toggle" id="themeToggle" title="Cambiar tema">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
                <button class="cart-toggle" id="cartToggle" title="Ver carrito">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- BANNER PRINCIPAL (CARRUSEL) -->
    <div class="preorder-banner-container" id="preorderBannerContainer"></div>

    <div class="container">
        <!-- FILTROS (DESPLEGABLES) -->
        <aside class="filters" id="filtersPanel">
            <div class="filters-header">
                <h3><i class="fas fa-filter"></i> Filtros</h3>
                <button class="filters-close" id="filtersClose"><i class="fas fa-times"></i></button>
            </div>
            <div class="filter-group">
                <label><i class="fas fa-search"></i> Buscar</label>
                <input type="text" id="searchFilter" placeholder="Ej: Elite Trainer Box">
            </div>
            <div class="filter-group">
                <label><i class="fas fa-tag"></i> Categoría</label>
                <select id="categoryFilter" onchange="filterProducts()">
                    <option value="all">Todas</option>
                    <option value="pokemon">Pokémon TCG</option>
                    <option value="funko">Funko Pop</option>
                    <option value="otros">Otros</option>
                </select>
            </div>
            <div class="filter-group">
                <label><i class="fas fa-layer-group"></i> Expansión</label>
                <select id="expansionFilter" onchange="filterProducts()">
                    <option value="all">Todas</option>
                    <option value="30th-anniversary">30th Anniversary</option>
                    <option value="chaos-rising">Chaos Rising</option>
                    <option value="ascended-heroes">Ascended Heroes</option>
                    <option value="mega-evolucion">Mega Evolución</option>
                    <option value="phantasmal-flames">Phantasmal Flames</option>
                    <option value="llamaradas-fantasmales">Llamaradas Fantasmales</option>
                    <option value="journey-together">Journey Together</option>
                    <option value="shrouded-fable">Shrouded Fable</option>
                    <option value="surging-sparks">Surging Sparks</option>
                    <option value="destined-rivals">Destined Rivals</option>
                    <option value="evoluciones-prismaticas">Evoluciones Prismáticas</option>
                    <option value="destinos-paldea">Destinos de Paldea</option>
                    <option value="151">Colección 151</option>
                    <option value="prismatic-evolutions">Prismatic Evolutions</option>
                    <option value="perfect-order">Perfect Order</option>
                    <option value="heat-wave-arena">Heat Wave Arena</option>
                    <option value="pitch-black">Pitch Black</option>
                </select>
            </div>
            <div class="filter-group">
                <label><i class="fas fa-fire"></i> Promociones</label>
                <label class="checkbox-label">
                    <input type="checkbox" id="promoFilter" onchange="filterProducts()">
                    <span>Ver solo promociones</span>
                </label>
            </div>
            <div class="filter-group">
                <label><i class="fas fa-language"></i> Idioma</label>
                <select id="languageFilter">
                    <option value="all">Todos</option>
                    <option value="es">Español</option>
                    <option value="en">Inglés</option>
                    <option value="jp">Japonés</option>
                    <option value="none">Sin idioma</option>
                </select>
            </div>
            <div class="filter-group">
                <label><i class="fas fa-dollar-sign"></i> Precio máximo</label>
                <input type="number" id="priceFilter" placeholder="Ej: 300000" min="0" step="1000">
            </div>
            <div class="filter-group">
                <label><i class="fas fa-boxes"></i> Disponibilidad</label>
                <select id="stockFilter">
                    <option value="all">Todas</option>
                    <option value="available">En stock</option>
                    <option value="encargo">Encargo</option>
                    <option value="soon">Próximamente</option>
                    <option value="agotado">Agotado</option>
                </select>
            </div>
            <div class="filter-actions">
                <button onclick="filterProducts()" class="btn-primary"><i class="fas fa-search"></i> Aplicar</button>
                <button onclick="resetFilters()" class="btn-secondary"><i class="fas fa-undo"></i> Limpiar</button>
            </div>
        </aside>

        <!-- GRID DE PRODUCTOS -->
        <main class="products-grid" id="productsGrid">
            <!-- Productos renderizados por JS -->
        </main>
    </div>

    <!-- CARRITO -->
    <div class="cart-panel" id="cartPanel">
        <div class="cart-header">
            <h3>Tu Carrito</h3>
            <button class="cart-close" id="cartClose"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotal">$0</span>
            </div>
            <button class="btn-whatsapp" id="checkoutWhatsApp">
                <i class="fab fa-whatsapp"></i> Finalizar compra
            </button>
        </div>
    </div>
    <div class="cart-overlay" id="cartOverlay"></div>

    <!-- BOTÓN FLOTANTE WHATSAPP -->
    <a href="https://wa.me/3115416469?text=Hola!%20Vi%20tu%20catálogo%20y%20quiero%20consultar%20por%20un%20producto" 
       class="floating-btn whatsapp-btn" target="_blank" title="WhatsApp">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- SCRIPTS -->
    <script src="data.js"></script>
    <script src="script.js"></script>
    <script src="admin.js"></script>
</body>
</html>
